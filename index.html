<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>TYT Clock</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body{margin:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(120deg,#0b1220,#021018);color:white;font-family:Arial}h1{opacity:.8;margin-bottom:10px}#clock{display:flex;font-size:120px;font-weight:bold;letter-spacing:10px}#tyt{position:absolute;bottom:40px;font-size:18px;opacity:.8}</style></head><body><h1>Saat</h1><div id="clock">00:00</div><div id="tyt">TYT: hesaplanıyor...</div><script>const target=new Date("2026-06-20T10:15:00");function update(){const now=new Date();let h=now.getHours().toString().padStart(2,"0");let m=now.getMinutes().toString().padStart(2,"0");document.getElementById("clock").innerText=h+":"+m;let diff=target-now;if(diff<0)diff=0;let days=Math.floor(diff/(1000*60*60*24));document.getElementById("tyt").innerText="TYT: "+days+" gün"}setInterval(update,1000);update();</script></body></html>
