<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYT Saat</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:linear-gradient(120deg,#071320,#03121a);
color:white;
font-family:Arial;
}

h1{
opacity:0.7;
margin-bottom:30px;
}

.clock{
display:flex;
gap:10px;
font-size:140px;
font-weight:bold;
}

.flip{
background:#111;
padding:20px 30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
min-width:110px;
text-align:center;
}

.separator{
font-size:140px;
padding:0 10px;
}

#tyt{
margin-top:60px;
opacity:0.8;
font-size:20px;
}

.fullscreen{
position:absolute;
bottom:20px;
right:20px;
padding:10px 18px;
background:rgba(255,255,255,0.08);
border-radius:10px;
cursor:pointer;
}

.flip-change{
animation:flip 0.4s;
}

@keyframes flip{
0%{transform:rotateX(90deg);opacity:0}
100%{transform:rotateX(0deg);opacity:1}
}

</style>
</head>

<body>

<h1>Saat</h1>

<div class="clock">
<div class="flip" id="h1">0</div>
<div class="flip" id="h2">0</div>

<div class="separator">:</div>

<div class="flip" id="m1">0</div>
<div class="flip" id="m2">0</div>

<div class="separator">:</div>

<div class="flip" id="s1">0</div>
<div class="flip" id="s2">0</div>
</div>

<div id="tyt"></div>

<div class="fullscreen" onclick="toggleFullscreen()">Tam ekran</div>

<script>

function updateClock(){

const now = new Date()

let h = String(now.getHours()).padStart(2,"0")
let m = String(now.getMinutes()).padStart(2,"0")
let s = String(now.getSeconds()).padStart(2,"0")

setFlip("h1",h[0])
setFlip("h2",h[1])
setFlip("m1",m[0])
setFlip("m2",m[1])
setFlip("s1",s[0])
setFlip("s2",s[1])

}

function setFlip(id,value){

const el=document.getElementById(id)

if(el.innerText!==value){
el.innerText=value
el.classList.add("flip-change")
setTimeout(()=>el.classList.remove("flip-change"),400)
}

}

setInterval(updateClock,1000)
updateClock()

const exam=new Date("2026-06-20T10:15:00")

function updateTYT(){

const now=new Date()
const diff=exam-now

const days=Math.ceil(diff/(1000*60*60*24))

document.getElementById("tyt").innerText="TYT: "+days+" gün"

}

setInterval(updateTYT,60000)
updateTYT()

function toggleFullscreen(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}else{
document.exitFullscreen()
}

}

</script>

</body>
</html>
